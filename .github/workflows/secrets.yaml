name: secrets
on: push
env:
    repo: test-repo1110
    username: mikeytr07
    password: Sakthisrin@077
    imagename: 
jobs:
    docker-build:
        runs-on: ubuntu-slim
        steps:
            - name: docker
              run: echo docker build -t ${{ env.repo }}/${{ env.username }}/${{ env.imagename}}:latest
            - name: docker login
              run: echo docker login --username=${{ env.username }} --password=${{ env.password }}
            - name: docker push
              run: echo docker push ${{ env.repo }}/${{ env.username }}/${{ env.imagename}}
    docker-deploy:
        needs: docker-build
        runs-on: ubuntu-slim
        steps:
            - name: deploy
              run: docker run -p 8080:80 ${{ env.repo }}/${{ env.username }}/${{ env.imagename}}:latest