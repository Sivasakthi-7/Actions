name: dragon
on: push
jobs:
    build-1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: permission
              run: chmod +x script.sh
            - name: run shell script
              run: ./script.sh
            - name: upload artifact
              uses: actions/upload-artifact@v7
              with:
                name: dragon-text
                path: dragon.txt
    test-1:
        needs: build-1
        runs-on: ubuntu-latest
        steps:
            - name: download artifact
              uses: actions/download-artifact@v8
              with:
                name: dragon-text
            - name: list
              run: |
               ls -ltr
               cat dragon.txt
    deploy-1:
        needs: [build-1,test-1]
        runs-on: ubuntu-latest
        steps:
            - name: sleep
              run: sleep 10